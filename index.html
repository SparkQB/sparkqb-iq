<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Caller — SparkQB</title>
<link rel="stylesheet" href="css/sparkqb.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--black);
  position: relative;
  overflow: hidden;
}
.login-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,79,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 30%, rgba(178,255,0,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.login-logomark {
  width: 44px; height: 44px;
  background: var(--green);
  clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
}
.login-wordmark {
  font-family: 'Anton', sans-serif;
  font-size: 28px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.login-wordmark span { color: var(--green); }
.login-subtitle {
  font-family: 'Roboto Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 40px;
  padding-left: 56px;
}
.login-card {
  background: var(--gray1);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
}
.login-title {
  font-family: 'Anton', sans-serif;
  font-size: 28px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.login-desc {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.login-tabs {
  display: flex;
  gap: 0;
  background: var(--gray2);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 24px;
}
.login-tab {
  flex: 1;
  padding: 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Roboto Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.login-tab.active {
  background: var(--gray3);
  color: var(--white);
}
.login-footer {
  margin-top: 20px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logomark"></div>
      <div class="login-wordmark">Spark<span>QB</span></div>
    </div>
    <div class="login-subtitle">Signal Caller Training System</div>

    <div class="login-card">
      <div class="login-title">Welcome Back</div>
      <div class="login-desc">Sign in to your locker room or create an account.</div>

      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="login-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="alert-box"></div>

      <div id="signin-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signin-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signin-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="signIn()">
          Sign In →
        </button>
      </div>

      <div id="signup-form" class="hidden">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signup-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="signUp()">
          Create Account →
        </button>
      </div>

      <div class="login-footer">
        Powered by SparkQB · Signal Caller v1.0
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script>
(async () => {
  const user = await getUser();
  if (user) window.location.href = 'locker-room.html';
})();

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'));
  });
  document.getElementById('signin-form').classList.toggle('hidden', tab !== 'signin');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  clearAlert();
}

function showAlert(msg, type = 'error') {
  document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
function clearAlert() { document.getElementById('alert-box').innerHTML = ''; }

async function signIn() {
  const email = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) return showAlert('Please enter your email and password.');
  const btn = event.target; btn.textContent = 'Signing in...'; btn.disabled = true;
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) { showAlert(error.message); btn.textContent = 'Sign In →'; btn.disabled = false; return; }
  window.location.href = 'locker-room.html';
}

async function signUp() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) return showAlert('Please fill in all fields.');
  if (password.length < 6) return showAlert('Password must be at least 6 characters.');
  const btn = event.target; btn.textContent = 'Creating account...'; btn.disabled = true;

  const { data, error } = await db.auth.signUp({ email, password });
  if (error) {
    showAlert(error.message);
    btn.textContent = 'Create Account →';
    btn.disabled = false;
    return;
  }

  if (data.user) {
    const { error: profileError } = await db.from('players').insert({
      id: data.user.id,
      full_name: name,
      email: email
    });
    if (profileError) {
      showAlert('Account created but profile failed: ' + profileError.message + ' — try signing in.');
      btn.textContent = 'Create Account →';
      btn.disabled = false;
      return;
    }
    showAlert('Account created! Redirecting to your locker room...', 'success');
    setTimeout(() => window.location.href = 'locker-room.html', 1500);
  } else {
    showAlert('Check your email to confirm your account, then sign in.');
    btn.textContent = 'Create Account →';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.getElementById('signin-form').classList.contains('hidden') ? 'signup' : 'signin';
    active === 'signin' ? signIn() : signUp();
  }
});
</script>
</body>
</html>
