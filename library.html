<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.library-wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Hero */
.library-hero {
  background: var(--gray1);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.hero-left h1 { font-size: clamp(28px, 4vw, 40px); margin-bottom: 6px; }
.hero-stat { font-family: 'Roboto Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
.hero-stat span { color: var(--green); }
.hero-right { display: flex; gap: 10px; flex-shrink: 0; }

/* Search */
.search-wrap { position: relative; margin-bottom: 20px; }
.search-input {
  width: 100%;
  background: var(--gray1);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-lg);
  padding: 14px 16px 14px 44px;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }

/* Filter tabs */
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-tab {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Roboto Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-tab:hover { border-color: var(--border-md); color: var(--white); }
.filter-tab.active { border-color: var(--green); color: var(--green); background: rgba(178,255,0,0.06); }

/* Category sections */
.category-section { margin-bottom: 32px; }
.category-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.category-icon { font-size: 20px; }
.category-name { font-family: 'Anton', sans-serif; font-size: 22px; }
.category-count { font-family: 'Roboto Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

/* Video grid */
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

/* Video card */
.video-card {
  background: var(--gray1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.video-card:hover { border-color: var(--border-md); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.video-thumb {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: var(--gray2);
  overflow: hidden;
}
.video-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.video-thumb-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray2);
}
.play-btn {
  width: 48px; height: 48px;
  background: rgba(178,255,0,0.15);
  border: 2px solid var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.video-card:hover .play-btn {
  background: var(--green);
  box-shadow: 0 0 20px rgba(178,255,0,0.4);
}
.play-arrow {
  width: 0; height: 0;
  border-style: solid;
  border-width: 8px 0 8px 16px;
  border-color: transparent transparent transparent var(--green);
  margin-left: 3px;
  transition: border-color 0.2s;
}
.video-card:hover .play-arrow { border-color: transparent transparent transparent var(--black); }
.video-duration {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.8);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'Roboto Mono', monospace;
  font-size: 9px;
  color: var(--white);
}
.video-info { padding: 14px; }
.video-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.video-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.video-tag {
  font-family: 'Roboto Mono', monospace;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.video-tag.coverage { border-color: rgba(0,79,255,0.3); color: #6699ff; }
.video-tag.front { border-color: rgba(255,140,0,0.3); color: #ffaa44; }
.video-tag.concept { border-color: rgba(178,255,0,0.3); color: var(--green); }
.video-tag.comparison { border-color: rgba(255,4,0,0.3); color: #ff6666; }

/* Video modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box {
  width: 100%;
  max-width: 900px;
  background: var(--gray1);
  border: 1px solid var(--border-md);
  border-radius: var(--radius-xl);
  overflow: hidden;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-family: 'Anton', sans-serif; font-size: 20px; }
.modal-close {
  background: var(--gray2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  cursor: pointer;
  color: var(--white);
  font-family: 'Roboto Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-video {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
}
.modal-video iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.modal-footer {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.modal-nav { display: flex; gap: 8px; }

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.no-results-icon { font-size: 48px; margin-bottom: 16px; }

/* Progress tracker */
.progress-card {
  background: var(--gray2);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.progress-card-label { font-family: 'Roboto Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
.progress-card-val { font-family: 'Anton', sans-serif; font-size: 22px; color: var(--green); }

@media (max-width: 600px) {
  .library-hero { flex-direction: column; }
  .hero-right { width: 100%; }
  .hero-right .btn { flex: 1; justify-content: center; }
  .video-grid { grid-template-columns: 1fr; }
}
</style>

];

const CATEGORIES = [
  { id: 'comparison', label: 'ID Keys & Comparisons', icon: '🔍', desc: 'Learn to tell coverages apart' },
  { id: 'coverage', label: 'Coverage Families', icon: '🛡', desc: 'Deep dives on every coverage' },
  { id: 'front', label: 'Defensive Fronts', icon: '💪', desc: 'Read the box and identify fronts' },
];

let currentFilter = 'all';
let currentVideoIdx = 0;
let filteredVideos = [...VIDEOS];
let watched = JSON.parse(localStorage.getItem('sqb_watched') || '[]');

function getVimeoEmbedUrl(url) {
  const match = url.match(/vimeo\.com\/(\d+)\/([a-f0-9]+)/);
  if (match) return `https://player.vimeo.com/video/${match[1]}?h=${match[2]}&autoplay=1&title=0&byline=0&portrait=0`;
  const match2 = url.match(/vimeo\.com\/(\d+)/);
  if (match2) return `https://player.vimeo.com/video/${match2[1]}?autoplay=1&title=0&byline=0&portrait=0`;
  return url;
}

function getTagClass(tag) {
  const coverageTags = ['Cover 0','Cover 1','Cover 2','Cover 3','Cover 4','Cover 6','Tampa 2','2-Man','Man Coverage'];
  const frontTags = ['4-3','3-4','Bear','Eagle','Okie','Stack','Fronts'];
  if (coverageTags.some(t => tag.includes(t))) return 'coverage';
  if (frontTags.some(t => tag.includes(t))) return 'front';
  if (tag === 'ID Keys' || tag === 'S&W' || tag === 'Comparison') return 'comparison';
  return 'concept';
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  filterVideos();
}

function filterVideos() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  filteredVideos = VIDEOS.filter(v => {
    const matchesFilter = currentFilter === 'all' || v.category === currentFilter;
    const matchesSearch = !query ||
      v.title.toLowerCase().includes(query) ||
      v.tags.some(t => t.toLowerCase().includes(query));
    return matchesFilter && matchesSearch;
  });
  renderLibrary();
}

function renderLibrary() {
  const content = document.getElementById('library-content');
  if (filteredVideos.length === 0) {
    content.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">📋</div>
        <h3 class="mb-8">No videos found</h3>
        <p class="text-muted">Try a different search term or filter</p>
      </div>`;
    return;
  }

  const isSearching = document.getElementById('search-input').value.trim();

  if (isSearching || currentFilter !== 'all') {
    content.innerHTML = `
      <div class="category-section">
        <div class="video-grid">
          ${filteredVideos.map((v, i) => renderVideoCard(v, VIDEOS.indexOf(v))).join('')}
        </div>
      </div>`;
    return;
  }

  let html = '';
  CATEGORIES.forEach(cat => {
    const catVideos = VIDEOS.filter(v => v.category === cat.id);
    if (catVideos.length === 0) return;
    html += `
      <div class="category-section">
        <div class="category-header">
          <div class="category-icon">${cat.icon}</div>
          <div>
            <div class="category-name">${cat.label}</div>
          </div>
          <div class="category-count">${catVideos.length} videos</div>
        </div>
        <div class="video-grid">
          ${catVideos.map(v => renderVideoCard(v, VIDEOS.indexOf(v))).join('')}
        </div>
      </div>`;
  });
  content.innerHTML = html;
}

// Cache thumbnails so we don't re-fetch
const thumbCache = {};

async function fetchThumb(url, idx) {
  if (thumbCache[idx]) return thumbCache[idx];
  try {
    // Use oEmbed endpoint — works with private/unlisted Vimeo videos
    const encodedUrl = encodeURIComponent(url);
    const res = await fetch(`https://vimeo.com/api/oembed.json?url=${encodedUrl}&width=640`);
    if (!res.ok) return null;
    const data = await res.json();
    const thumb = data?.thumbnail_url || null;
    if (!thumb) return null;
    thumbCache[idx] = thumb;
    const imgEl = document.getElementById(`thumb-${idx}`);
    if (imgEl) {
      imgEl.src = thumb;
      imgEl.style.display = 'block';
      const placeholder = document.getElementById(`placeholder-${idx}`);
      if (placeholder) placeholder.style.display = 'none';
    }
    return thumb;
  } catch (e) { return null; }
}

function renderVideoCard(v, idx) {
  const isWatched = watched.includes(idx);
  // Kick off thumbnail fetch asynchronously
  fetchThumb(v.url, idx);
  return `
    <div class="video-card ${isWatched ? 'watched' : ''}" onclick="openVideo(${idx})">
      <div class="video-thumb">
        <img id="thumb-${idx}" src="" alt="${v.title}" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
        <div class="video-thumb-placeholder" id="placeholder-${idx}">
          <div class="play-btn">
            <div class="play-arrow"></div>
          </div>
        </div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <div class="play-btn" style="background:rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.8)">
            <div class="play-arrow" style="border-color:transparent transparent transparent rgba(255,255,255,0.9)"></div>
          </div>
        </div>
        ${isWatched ? '<div style="position:absolute;top:8px;right:8px;background:rgba(178,255,0,0.9);border-radius:20px;padding:2px 8px;font-family:Roboto Mono,monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.06em;color:#000">✓ Watched</div>' : ''}
      </div>
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-tags">
          ${v.tags.map(t => `<span class="video-tag ${getTagClass(t)}">${t}</span>`).join('')}
        </div>
      </div>
    </div>`;
}

function openVideo(idx) {
  const video = VIDEOS[idx];
  currentVideoIdx = idx;
  document.getElementById('modal-title').textContent = video.title;
  document.getElementById('modal-iframe').src = getVimeoEmbedUrl(video.url);
  document.getElementById('modal-tags').innerHTML = video.tags.map(t => `<span class="video-tag ${getTagClass(t)}">${t}</span>`).join('');
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === VIDEOS.length - 1;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  markWatched(idx);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-iframe').src = '';
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function navVideo(dir) {
  const newIdx = currentVideoIdx + dir;
  if (newIdx >= 0 && newIdx < VIDEOS.length) openVideo(newIdx);
}

function markWatched(idx) {
  if (!watched.includes(idx)) {
    watched.push(idx);
    localStorage.setItem('sqb_watched', JSON.stringify(watched));
    updateProgress();
    renderLibrary();
  }
}

function updateProgress() {
  const count = watched.length;
  const pct = Math.round(count / VIDEOS.length * 100);
  document.getElementById('watched-count').textContent = `${count} / ${VIDEOS.length}`;
  document.getElementById('watched-bar').style.width = pct + '%';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') navVideo(1);
  if (e.key === 'ArrowLeft') navVideo(-1);
});

async function init() {
  // Give Supabase session time to restore before checking auth
  await new Promise(resolve => setTimeout(resolve, 100));
  const user = await getUser();
  if (!user) {
    window.location.href = 'index.html';
    return;
  }
  updateProgress();
  renderLibrary();
}

init();
</script>
</body>
</html>
